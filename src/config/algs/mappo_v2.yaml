# --- MAPPO specific parameters ---

action_selector: "soft_policies"
mask_before_softmax: True

runner: "parallel"

buffer_size: 32
batch_size: 32

lr: 0.0003
hidden_dim: 128
layer_norm: True
n_layers: 2

obs_agent_id: True
obs_last_action: False
obs_individual_obs: False  # always verify the state content (often concat of individuals obs)

# use IA2C
agent_output_type: "pi_logits"
learner: "ppo_learner_v2"
entropy_coef: 0.01
standardise_returns: True
standardise_rewards: True  # always True i thinks
critic_type: "cv_critic"
epochs: 10
eps_clip: 0.1

gae_lambda: 0.95
normalise_advantages: True
eps_clip_v: 0.2
use_clipped_value_loss: True


name: "mappo_v2_tmp-fo"
agent: "mlp"
