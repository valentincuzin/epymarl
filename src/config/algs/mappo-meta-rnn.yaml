# --- MAPPO specific parameters ---

action_selector: "soft_policies"
mask_before_softmax: True

runner: "parallel"

buffer_size: 128
batch_size: 128

# Communication setting
comm_range: 0.5
env_args:
  visual_comm_range: 0.5  # must be the same as comm_range parameter

residual_gat: True
edge_attr: True

maml_lr: 0.008
drop_rate: 0.16
early_stop: 5
win_size_max: 5

# update the target network every {} training steps
target_update_interval_or_tau: 0.1

lr: 0.0006
grad_norm_clip: 0.5 # Reduce magnitude of gradients above this L2 norm

h_dim: 192
gnn_dim: 256 # TODO must be the same than mem_dim
mem_dim: 256

n_layers: 0

obs_agent_id: True
obs_last_action: False
obs_individual_obs: False  # always verify the state content (often concat of individuals obs)

# use IA2C
agent_output_type: "pi_logits"
learner: "ppo_learner"
mac: "wingnn_mac"
entropy_coef: 0.1

q_nstep: 5 # 1 corresponds to normal r + gammaV
critic_type: "cv_critic"
epochs: 10
eps_clip: 0.2

name: "mappo-meta-rnn"
agent: "rnn"
