# --- Defaults ---

# --- pymarl options ---
mac: "basic_mac" # Basic controller
common_reward: True  # Run experiment with common reward setup
reward_scalarisation: "sum"  # How to aggregate rewards to single common reward (only used if common_reward is True)

env_args: {
  num_good: 3,
  num_adversaries: 10,
  num_obstacles: 3,
  max_cycles: 50,
  observation_range: 0.3,
  dynamic_rescaling: True,
  render_mode: 'rgb_array',
} # Arguments for the environment

# --- Communication Constraint ---
comm_range: 0.3

use_cuda: True # Use gpu by default unless it isn't available
buffer_cpu_only: True # If true we won't keep all of the replay buffer in vram
seed: 0

# --- Logging options ---
use_tensorboard: False # Log results to tensorboard
use_wandb: True # Log results to W&B
wandb_team: valentincuzin-ucbl1 # W&B team name
wandb_project: epymarl5 # W&B project name
wandb_mode: "online" # W&B mode (online/offline)
wandb_save_model: False # Save models to W&B (only done if use_wandb is True and save_model is True)
save_model: False # Save the models to disk
save_model_interval: 50000 # Save models after this many timesteps
checkpoint_path: "" # Load a checkpoint from this path
evaluate: False # Evaluate model for test_nepisode episodes and quit (no training)
render: False # Render the environment when evaluating (only when evaluate == True)
load_step: 0 # Load model trained on this many timesteps (0 if choose max possible)
save_replay: False # Saving the replay of the model loaded from checkpoint_path
local_results_path: "results" # Path for local results

# --- RL hyperparameters ---
gamma: 0.99
batch_size: 32 # Number of episodes to train on
buffer_size: 32 # Size of the replay buffer
optim_alpha: 0.99 # RMSProp alpha
optim_eps: 0.00001 # RMSProp epsilon
grad_norm_clip: 10 # Reduce magnitude of gradients above this L2 norm
add_value_last_step: True

# --- Experiment running params ---
repeat_id: 1
label: "default_label"
hypergroup: null
