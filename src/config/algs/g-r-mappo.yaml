# --- MAPPO specific parameters ---

action_selector: "soft_policies"
mask_before_softmax: True

runner: "parallel"

buffer_size: 128
batch_size: 128

# Communication setting
comm_range: 0.5
env_args:
  visual_comm_range: 0.5  # must be the same as comm_range parameter

residual_gat: True
edge_attr: True

# update the target network every {} training steps
target_update_interval_or_tau: 0.1

lr: 0.0006982018500958714
grad_norm_clip: 0.18321028091050504 # Reduce magnitude of gradients above this L2 norm

h_dim: 320
gnn_dim: 192
mem_dim: 64

n_layers: 1

obs_agent_id: True
obs_last_action: False
obs_individual_obs: False  # always verify the state content (often concat of individuals obs)

# use IA2C
agent_output_type: "pi_logits"
learner: "ppo_learner"
entropy_coef: 0.05255699444304569

q_nstep: 6 # 1 corresponds to normal r + gammaV
critic_type: "cv_critic"
epochs: 12
eps_clip: 0.13078860822329919

name: "g-r-mappo-t3"
agent: "gnn_rnn"
