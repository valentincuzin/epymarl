# --- MAPPO specific parameters ---

action_selector: "soft_policies"
mask_before_softmax: True

runner: "parallel"

buffer_size: 64
batch_size: 64

# Communication setting
comm_range: 0.5
env_args:
  visual_comm_range: 0.5  # must be the same as comm_range parameter

n_heads_gat: 1
dropout_gat: 0.1
residual_gat: False
edge_attr: True

# update the target network every {} training steps
target_update_interval_or_tau: 0.4035008347505672

lr: 4.771007201499188e-05
grad_norm_clip: 0.5 # Reduce magnitude of gradients above this L2 norm

h_dim: 192
gnn_dim: 256
mem_dim: 256

n_layers: 2
aggr: "mean"  # among ["mean", "sum", "max"]
skipfeats: True

obs_agent_id: True
obs_last_action: False
obs_individual_obs: False  # always verify the state content (often concat of individuals obs)

# use IA2C
agent_output_type: "pi_logits"
learner: "ppo_learner"
entropy_coef: 0.0015289582276904329

q_nstep: 12 # 1 corresponds to normal r + gammaV
critic_type: "cv_critic"
epochs: 12
eps_clip: 0.4333392095345052
grad_norm_clip: 0.7340349341852169


name: "tgn-mappo"
agent: "tgn"
