# --- MAPPO specific parameters ---

action_selector: "soft_policies"
mask_before_softmax: True

runner: "parallel"

buffer_size: 32
batch_size: 32

env_args: {
  observation_range: null,
}

# update the target network every {} training steps
target_update_interval_or_tau: 0.01

lr: 0.0003
grad_norm_clip: 0.5 # Reduce magnitude of gradients above this L2 norm

h_dim: 128

n_layers: 2

obs_agent_id: True
obs_last_action: False
obs_individual_obs: False  # always verify the state content (often concat of individuals obs)

# use IA2C
agent_output_type: "pi_logits"
learner: "ppo_learner"
entropy_coef: 0.01

q_nstep: 6 # 1 corresponds to normal r + gammaV
critic_type: "cv_critic"
epochs: 10
eps_clip: 0.1

name: "mappo-FO"
agent: "mlp"
